        // ===== 复制 =====
        function fallbackCopyText(text) {
            const textarea = document.createElement('textarea');
            const selection = document.getSelection();
            const selectedRange = selection && selection.rangeCount > 0 ? selection.getRangeAt(0) : null;
            textarea.value = text;
            textarea.setAttribute('readonly', '');
            textarea.style.position = 'fixed';
            textarea.style.top = '0';
            textarea.style.left = '0';
            textarea.style.width = '1px';
            textarea.style.height = '1px';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();
            textarea.setSelectionRange(0, textarea.value.length);
            let didCopy = false;
            try { didCopy = document.execCommand('copy'); } catch (error) { didCopy = false; }
            document.body.removeChild(textarea);
            if (selection && selectedRange) { selection.removeAllRanges(); selection.addRange(selectedRange); }
            return didCopy;
        }

        function copyTextToClipboard(text) {
            if (navigator.clipboard && window.isSecureContext) { return navigator.clipboard.writeText(text); }
            if (fallbackCopyText(text)) { return Promise.resolve(); }
            return Promise.reject(new Error('Clipboard is unavailable'));
        }

        function copyTodayNotes() {
            closeBarMenu();
            const notes = getCurrentNotes();
            if (notes.length === 0) { showToast('今天还没有记录'); return; }
            copyTextToClipboard(buildMarkdown(notes, getCurrentDateKey())).then(() => {
                showToast(`已复制 ${notes.length} 条记录`);
            }).catch(() => showToast('复制失败'));
        }

        function copySelectedNotes() {
            const selectedNotes = getSelectedNotes();
            if (selectedNotes.length === 0) { showToast('请先选择记录'); return; }
            copyTextToClipboard(buildMarkdown(selectedNotes, getCurrentDateKey())).then(() => {
                showToast(`已复制 ${selectedNotes.length} 条记录`);
            }).catch(() => showToast('复制失败'));
        }

        // ===== 导出/导入 =====
        function exportNotesBackup() {
            const data = getData();
            const totalCount = Object.values(data).reduce((t, notes) => t + (Array.isArray(notes) ? notes.length : 0), 0);
            if (totalCount === 0) { showToast('暂无记录可导出'); return; }
            const backup = { version: 1, exportedAt: new Date().toISOString(), data: data, tombstones: getTombstones() };
            const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `daily-notes-backup-${formatDate(new Date())}.json`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            showToast(`已导出 ${totalCount} 条记录`);
        }

        function normalizeImportedData(payload) {
            const importedData = payload && payload.data ? payload.data : payload;
            const normalized = {};
            let generatedId = Date.now();
            if (!importedData || typeof importedData !== 'object' || Array.isArray(importedData)) { return normalized; }
            Object.entries(importedData).forEach(([dateKey, notes]) => {
                if (!/^\d{4}-\d{2}-\d{2}$/.test(dateKey) || !Array.isArray(notes)) { return; }
                const normalizedNotes = notes
                    .filter(note => note && typeof note.content === 'string' && note.content.trim())
                    .map(note => {
                        const fallbackId = generatedId++;
                        const timestamp = Number(note.timestamp || note.id || fallbackId);
                        const id = Number(note.id || fallbackId);
                        return {
                            id: id,
                            content: note.content,
                            time: typeof note.time === 'string' && note.time ? note.time : '00:00',
                            timestamp: Number.isFinite(timestamp) ? timestamp : fallbackId,
                            updatedAt: Number(note.updatedAt) || (Number.isFinite(timestamp) ? timestamp : fallbackId),
                            sent: !!note.sent,
                            sentAt: note.sentAt || null
                        };
                    });
                if (normalizedNotes.length > 0) { normalized[dateKey] = normalizedNotes; }
            });
            return normalized;
        }

        function importNotesBackup(file) {
            if (!file) { return; }
            const reader = new FileReader();
            reader.onload = () => {
                try {
                    const imported = normalizeImportedData(JSON.parse(reader.result));
                    const data = getData();
                    let importedCount = 0;
                    Object.entries(imported).forEach(([dateKey, notes]) => {
                        const existingNotes = data[dateKey] || [];
                        const existingIds = new Set(existingNotes.map(note => note.id));
                        const newNotes = notes.filter(note => !existingIds.has(note.id));
                        if (newNotes.length > 0) {
                            data[dateKey] = [...newNotes, ...existingNotes].sort((a, b) => (b.timestamp || b.id || 0) - (a.timestamp || a.id || 0));
                            importedCount += newNotes.length;
                        }
                    });
                    if (importedCount === 0) { showToast('没有可导入的新记录'); return; }
                    saveData(data);
                    renderNotes();
                    showToast(`已导入 ${importedCount} 条记录`);
                    scheduleSync();
                } catch (error) { showToast('导入失败'); }
            };
            reader.onerror = () => showToast('导入失败');
            reader.readAsText(file);
        }

        // ===== 删除/合并多选 =====
        function deleteSelectedNotes() {
            const selectedNotes = getSelectedNotes();
            const dateKey = getCurrentDateKey();
            if (selectedNotes.length === 0) { showToast('请先选择记录'); return; }
            if (!confirm(`确定要删除选中的 ${selectedNotes.length} 条记录吗?`)) { return; }
            const data = getData();
            const notes = data[dateKey] || [];
            const selectedIds = new Set(selectedNotes.map(note => note.id));
            undoDeleteState = { dateKey: dateKey, beforeNotes: notes.map(note => ({ ...note })) };
            data[dateKey] = notes.filter(note => !selectedIds.has(note.id));
            if (data[dateKey].length === 0) { delete data[dateKey]; }
            saveData(data);
            const tomb = getTombstones();
            const now = Date.now();
            selectedIds.forEach(id => { tomb[id] = now; });
            saveTombstones(tomb);
            setSelectionMode(false);
            showToast(`已删除 ${selectedNotes.length} 条记录`, '撤销', undoDelete, 5000);
            scheduleSync();
        }

        function undoDelete() {
            if (!undoDeleteState) { return; }
            restoreNotesSnapshot(undoDeleteState);
            undoDeleteState = null;
            showToast('已撤销删除');
        }

        function mergeSelectedNotes() {
            const selectedNotes = getSelectedNotes();
            const dateKey = getCurrentDateKey();
            if (selectedNotes.length < 2) { showToast('至少选择 2 条才能合并'); return; }
            const data = getData();
            const notes = data[dateKey] || [];
            const selectedIds = new Set(selectedNotes.map(note => note.id));
            const firstNote = selectedNotes[0];
            const now = Date.now();
            const mergedNote = {
                id: now,
                content: selectedNotes.map(note => note.content).join('\n\n'),
                time: firstNote.time,
                timestamp: firstNote.timestamp || firstNote.id || now,
                updatedAt: now,
                sent: false,
                sentAt: null
            };
            undoMergeState = { dateKey: dateKey, beforeNotes: notes.map(note => ({ ...note })), removeIds: [mergedNote.id] };
            data[dateKey] = [mergedNote, ...notes.filter(note => !selectedIds.has(note.id))].sort((a, b) => (b.timestamp || b.id || 0) - (a.timestamp || a.id || 0));
            saveData(data);
            const tomb = getTombstones();
            selectedIds.forEach(id => { tomb[id] = now; });
            saveTombstones(tomb);
            setSelectionMode(false);
            showToast(`已合并 ${selectedNotes.length} 条`, '撤销', undoMerge, 5000);
            scheduleSync();
        }

        function undoMerge() {
            if (!undoMergeState) { return; }
            restoreNotesSnapshot(undoMergeState);
            undoMergeState = null;
            showToast('已撤销合并');
        }

        // ===== 底部菜单 =====
        function toggleBarMenu() {
            document.getElementById('barMenu').classList.toggle('show');
        }
        function closeBarMenu() {
            document.getElementById('barMenu').classList.remove('show');
        }

        // ===== 日期 =====
        function updateDateDisplay() {
            const dateDisplay = document.getElementById('dateDisplay');
            const isToday = formatDate(currentDate) === formatDate(new Date());
            const label = isToday ? '今天' : formatDateDisplay(currentDate);
            dateDisplay.innerHTML = `${label}<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>`;
            renderNotes();
        }

        // ===== 日历 =====
        let calViewDate = new Date();

        function countNotesForDate(data, dateKey) {
            const notes = data[dateKey];
            if (!Array.isArray(notes)) { return { total: 0, unsent: 0 }; }
            return { total: notes.length, unsent: notes.filter(n => !n.sent).length };
        }

        function openCalendar() {
            calViewDate = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
            renderCalendar();
            document.getElementById('calOverlay').classList.add('show');
        }

        function closeCalendar() {
            document.getElementById('calOverlay').classList.remove('show');
        }

        function renderCalendar() {
            const data = getData();
            const year = calViewDate.getFullYear();
            const month = calViewDate.getMonth();
            document.getElementById('calMonth').textContent = `${year} 年 ${month + 1} 月`;

            const firstDay = new Date(year, month, 1);
            const startWeekday = firstDay.getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const prevMonthDays = new Date(year, month, 0).getDate();
            const todayKey = formatDate(new Date());
            const selectedKey = formatDate(currentDate);

            const cells = [];
            // 上月补格
            for (let i = startWeekday - 1; i >= 0; i--) {
                cells.push({ day: prevMonthDays - i, other: true, date: new Date(year, month - 1, prevMonthDays - i) });
            }
            // 本月
            for (let d = 1; d <= daysInMonth; d++) {
                cells.push({ day: d, other: false, date: new Date(year, month, d) });
            }
            // 下月补格到整行
            while (cells.length % 7 !== 0) {
                const d = cells.length - (startWeekday + daysInMonth) + 1;
                cells.push({ day: d, other: true, date: new Date(year, month + 1, d) });
            }

            const grid = document.getElementById('calGrid');
            grid.innerHTML = cells.map(c => {
                const key = formatDate(c.date);
                const { total, unsent } = countNotesForDate(data, key);
                const classes = ['cal-cell'];
                if (c.other) { classes.push('other-month'); }
                if (key === todayKey) { classes.push('is-today'); }
                if (key === selectedKey) { classes.push('is-selected'); }
                const countClass = total === 0 ? 'none' : (unsent === 0 ? 'all-sent' : '');
                return `<button class="${classes.join(' ')}" onclick="selectCalendarDate('${key}')">
                    <span class="day-num">${c.day}</span>
                    <span class="day-count ${countClass}">${total || ''}</span>
                </button>`;
            }).join('');

            // 本月统计
            let monthNotes = 0;
            let monthDays = 0;
            const prefix = `${year}-${String(month + 1).padStart(2, '0')}-`;
            Object.keys(data).forEach(key => {
                if (key.startsWith(prefix) && Array.isArray(data[key]) && data[key].length > 0) {
                    monthDays += 1;
                    monthNotes += data[key].length;
                }
            });
            document.getElementById('statDays').textContent = monthDays;
            document.getElementById('statNotes').textContent = monthNotes;
            document.getElementById('statAvg').textContent = monthDays > 0 ? (monthNotes / monthDays).toFixed(1) : '0';
        }

        function selectCalendarDate(dateKey) {
            const parts = dateKey.split('-');
            currentDate = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
            if (isSelectionMode) { setSelectionMode(false); }
            closeCalendar();
            updateDateDisplay();
        }

        function calShiftMonth(delta) {
            calViewDate = new Date(calViewDate.getFullYear(), calViewDate.getMonth() + delta, 1);
            renderCalendar();
        }

        // ===== 事件绑定 =====
        document.getElementById('saveBtn').addEventListener('click', saveNote);
        document.getElementById('exportBtn').addEventListener('click', exportNotesBackup);
        document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
        document.getElementById('importFile').addEventListener('change', (e) => { importNotesBackup(e.target.files[0]); e.target.value = ''; });
        document.getElementById('noteInput').addEventListener('keydown', (e) => { if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { saveNote(); } });

        document.getElementById('selectBtn').addEventListener('click', () => setSelectionMode(!isSelectionMode));
        document.getElementById('dateDisplay').addEventListener('click', openCalendar);
        document.getElementById('calPrev').addEventListener('click', () => calShiftMonth(-1));
        document.getElementById('calNext').addEventListener('click', () => calShiftMonth(1));
        document.getElementById('calTodayBtn').addEventListener('click', () => selectCalendarDate(formatDate(new Date())));
        document.getElementById('calOverlay').addEventListener('click', (e) => { if (e.target.id === 'calOverlay') { closeCalendar(); } });
        document.getElementById('prevDay').addEventListener('click', () => { if (isSelectionMode) { setSelectionMode(false); } currentDate.setDate(currentDate.getDate() - 1); updateDateDisplay(); });
        document.getElementById('nextDay').addEventListener('click', () => { if (isSelectionMode) { setSelectionMode(false); } currentDate.setDate(currentDate.getDate() + 1); updateDateDisplay(); });
        document.getElementById('todayBtn').addEventListener('click', () => { if (isSelectionMode) { setSelectionMode(false); } currentDate = new Date(); updateDateDisplay(); });

        document.getElementById('sendUnsentBtn').addEventListener('click', sendUnsent);
        document.getElementById('moreBtn').addEventListener('click', (e) => { e.stopPropagation(); toggleBarMenu(); });
        document.getElementById('resendAllBtn').addEventListener('click', resendAll);
        document.getElementById('copyMenuBtn').addEventListener('click', copyTodayNotes);

        document.getElementById('settingsBtn').addEventListener('click', openSettings);
        document.getElementById('settingsCancel').addEventListener('click', closeSettings);
        document.getElementById('settingsSave').addEventListener('click', saveSettings);
        document.getElementById('syncNowBtn').addEventListener('click', () => { saveSettings(); syncNow(false); });
        document.getElementById('disconnectBtn').addEventListener('click', disconnectSync);
        document.getElementById('syncBtn').addEventListener('click', () => { if (!getSyncConfig().token) { openSettings(); } else { syncNow(false); } });
        document.getElementById('settingsOverlay').addEventListener('click', (e) => { if (e.target.id === 'settingsOverlay') { closeSettings(); } });

        const noteInputEl = document.getElementById('noteInput');
        noteInputEl.addEventListener('input', () => autoGrowTextarea(noteInputEl));
        autoGrowTextarea(noteInputEl);

        document.getElementById('selectAllBtn').addEventListener('click', toggleSelectAll);
        document.getElementById('copySelectedBtn').addEventListener('click', copySelectedNotes);
        document.getElementById('deleteSelectedBtn').addEventListener('click', deleteSelectedNotes);
        document.getElementById('mergeBtn').addEventListener('click', mergeSelectedNotes);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.getElementById('calOverlay').classList.contains('show')) { closeCalendar(); return; }
            if (!isSelectionMode) { return; }
            if (e.key === 'Escape') { setSelectionMode(false); }
            if (e.key.toLowerCase() === 'a' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); selectedNoteIds = new Set(getCurrentNotes().map(note => note.id)); renderNotes(); }
        });

        // 切回应用 / 重新聚焦时拉取远端（多设备场景）
        document.addEventListener('visibilitychange', () => { if (!document.hidden && getSyncConfig().token) { syncNow(true); } });
        window.addEventListener('focus', () => { if (getSyncConfig().token) { syncNow(true); } });

        // ===== 初始化 =====
        migrateData();
        setSyncStatus('ok');
        updateDateDisplay();
        if (getSyncConfig().token) { syncNow(true); }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(() => {});
            });
        }
    </script>
</body>
